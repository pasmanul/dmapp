name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --windowed --name dmapp main.py

      - name: Copy data folder into dist
        run: |
          Copy-Item -Path data -Destination dist\dmapp\data -Recurse -Exclude saves

      - name: Create empty saves and decks directories
        run: |
          New-Item -ItemType Directory -Force -Path dist\dmapp\data\saves
          New-Item -ItemType Directory -Force -Path dist\dmapp\data\decks

      - name: Create zip archive
        run: |
          Compress-Archive -Path dist\dmapp\* -DestinationPath dmapp-${{ github.ref_name }}-windows.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dmapp-${{ github.ref_name }}-windows.zip
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --windowed --name dmapp main.py

      - name: Copy data folder into app bundle
        run: |
          cp -r data dist/dmapp.app/Contents/MacOS/data
          rm -rf dist/dmapp.app/Contents/MacOS/data/saves

      - name: Create empty saves and decks directories
        run: |
          mkdir -p dist/dmapp.app/Contents/MacOS/data/saves
          mkdir -p dist/dmapp.app/Contents/MacOS/data/decks

      - name: Create zip archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/dmapp.app dmapp-${{ github.ref_name }}-macos.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dmapp-${{ github.ref_name }}-macos.zip
